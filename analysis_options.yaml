include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    # Third-party Rust build tooling vendored via flutter_rust_bridge.
    # Cargokit's build_tool depends on packages that aren't part of the
    # library's own dependency graph; analyzing it produces noise that
    # has nothing to do with manny_ui itself.
    - rust_builder/cargokit/**
    # Anything dropped under tmp/ during local experimentation.
    - tmp/**
    # Generated bridge code. Regenerated by flutter_rust_bridge_codegen
    # whenever the Rust API changes.
    - lib/src/rust/frb_generated.dart
    - lib/src/rust/frb_generated.io.dart
    - lib/src/rust/frb_generated.web.dart
